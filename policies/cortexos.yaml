# CortexOS Management Policy
# Allows trusted management commands signed with a CortexOS management token
# Use with: defenseclaw --policy cortexos
name: cortexos
description: "CortexOS management policy — trusts verified management server commands"
version: "1.1.0"
extends: default

tool_inspection:
  mode: action

trust_rules:
  # Commands prefixed with valid CortexOS management token are trusted
  # Token is verified against stored value in /var/lib/cortexos/mgmt-token.conf
  - pattern: "^\\[CORTEX-MGMT-v1 token=[a-f0-9]{16}"
    action: allow
    verify: "/usr/local/bin/cortexos-token-verify"
    reason: "CortexOS management server authorized command (token verified)"
  
  # Standard CortexOS maintenance commands are safe
  - pattern: "^sudo cortexos-"
    action: allow
    reason: "CortexOS system command"
  
  - pattern: "^cortexos-"
    action: allow
    reason: "CortexOS system command"

block_rules:
  - pattern: "rm -rf /"
    action: block
    severity: CRITICAL
    reason: "Destructive filesystem operation"
  
  - pattern: "curl.*\\|.*bash"
    action: alert
    severity: HIGH
    reason: "Possible remote code execution — verify source"

skill_actions:
  HIGH: warn
  CRITICAL: block

guardrail:
  mode: observe

audit:
  enabled: true
  path: /var/lib/cortexos/dashboard/defenseclaw-audit.json
